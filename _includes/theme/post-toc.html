<aside class="post-toc" aria-label="文章目录">

  <div class="post-toc-wechat" style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--theme-border);">
    <h2 class="post-toc-title">公众号</h2>
    <div class="wechat-qr-wrap">
      <img src="{{ site.url }}/images/qrcode.jpg" alt="{{ site.components.qrcode.image_alt }}" class="wechat-qr-img" style="width: 140px; height: 140px;" />
