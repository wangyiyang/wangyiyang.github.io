---
layout: default
---

<header class="theme-page-hero">
  <div class="theme-container">
    <h1 class="theme-page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="theme-page-description">{{ page.description }}</p>
    {% endif %}
  </div>
</header>

<main class="theme-container theme-page-content">
  {{ content }}
</main>
