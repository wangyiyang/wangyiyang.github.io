name: Sync to Qiniu CDN

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      JEKYLL_GITHUB_TOKEN: ${{ github.token }}
      QINIU_AK: ${{ secrets.QINIU_AK }}
      QINIU_SK: ${{ secrets.QINIU_SK }}
      QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
      QINIU_USERNAME: blog-wangyy
      QSHELL_VERSION: 2.19.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install qshell
        run: |
          curl -fL \
            -e "https://developer.qiniu.com/kodo/tools/1302/qshell" \
            -A "Mozilla/5.0" \
            "https://kodo-toolbox-new.qiniu.com/qshell-v${QSHELL_VERSION}-linux-amd64.tar.gz" \
            -o qshell.tar.gz
          tar -xzf qshell.tar.gz
          sudo install -m 0755 qshell /usr/local/bin/qshell
          qshell version

      - name: Validate Qiniu secrets
        run: |
          test -n "${QINIU_AK}" || { echo "QINIU_AK is missing"; exit 1; }
          test -n "${QINIU_SK}" || { echo "QINIU_SK is missing"; exit 1; }
          test -n "${QINIU_BUCKET}" || { echo "QINIU_BUCKET is missing"; exit 1; }

      - name: Build and sync to Qiniu
        run: make cdn-sync
